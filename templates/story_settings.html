<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إعدادات الستوري - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><nav class="navbar"><div class="logo">📖 Syst <span>إعدادات الستوري</span></div><div style="display:flex;align-items:center;gap:8px;"><button onclick="window.location.href='/dashboard'" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 14px;border-radius:30px;cursor:pointer;">⬅️ رجوع</button></div></nav>
<div class="container"><div class="settings-card"><h3>📖 إعدادات الستوري</h3><form method="post"><div class="settings-item"><span>من يمكنه رؤية قصصي</span><select name="privacy"><option value="everyone" {% if settings.privacy=='everyone' %}selected{% endif %}>الجميع</option><option value="contacts" {% if settings.privacy=='contacts' %}selected{% endif %}>جهات الاتصال</option><option value="nobody" {% if settings.privacy=='nobody' %}selected{% endif %}>لا أحد</option></select></div><div class="settings-item"><span>مدة بقاء القصة (ساعات)</span><input type="number" name="duration_hours" value="{{ settings.duration_hours }}" min="1" max="72"></div><button type="submit" style="margin-top:10px;">حفظ الإعدادات</button></form></div></div></body></html>
