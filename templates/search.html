<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>بحث - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><nav class="navbar"><div class="logo">🔍 Syst <span>بحث</span></div><button onclick="window.location.href='/dashboard'" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 14px;border-radius:30px;cursor:pointer;">⬅️ رجوع</button></nav>
<div class="container"><div class="settings-card"><h3>🔍 بحث عن أشخاص</h3><input type="text" id="search-input" placeholder="ابحث باسم..." oninput="filterUsers(this.value)" style="width:100%;padding:12px;border-radius:30px;border:2px solid #e5e7eb;font-size:16px;"><div id="search-results">{% for u in users %}<div class="result-item" data-username="{{ u.username }}" data-display="{{ u.display_name }}" style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3f4f6;"><span>👤 {{ u.display_name }} <span style="color:#888;font-size:13px;">@{{ u.username }}</span></span><button onclick="window.location.href='/chat/private/{{ u.id }}'" style="background:var(--primary);color:white;border:none;padding:4px 16px;border-radius:30px;cursor:pointer;">💬</button></div>{% endfor %}</div></div></div>
<script>function filterUsers(q){const items=document.querySelectorAll('.result-item');q=q.toLowerCase();items.forEach(i=>{const un=i.dataset.username.toLowerCase();const dn=i.dataset.display.toLowerCase();i.style.display=(un.includes(q)||dn.includes(q))?'flex':'none';});}</script>
</body></html>
