<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تسجيل الدخول - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="auth-container"><h1>💬 Syst</h1><p class="sub">تسجيل الدخول إلى حسابك</p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><input type="text" name="username" placeholder="اسم المستخدم" required><input type="password" name="password" placeholder="كلمة المرور" required><button type="submit">دخول</button></form><div class="links"><a href="/signup">إنشاء حساب</a> | <a href="/forgot-password">نسيت كلمة المرور؟</a></div></div></body></html>
