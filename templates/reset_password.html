<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تعيين كلمة مرور جديدة - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="auth-container"><h1>🔑 كلمة مرور جديدة</h1><p class="sub">للمستخدم: <strong>{{ username }}</strong></p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><input type="password" name="password" placeholder="كلمة المرور الجديدة (6 أحرف)" required minlength="6"><input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور" required><button type="submit">تحديث كلمة المرور</button></form><div class="links"><a href="/login">← العودة لتسجيل الدخول</a></div></div></body></html>
