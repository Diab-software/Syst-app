<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحقق 2FA - Syst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 p-md-5 shadow-lg border-0 rounded-4" style="max-width: 400px; width: 100%;">
            <h4 class="text-center">تحقق من رمز 2FA</h4>
            <p class="text-muted text-center">أدخل الرقم من تطبيق المصادقة</p>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="otp" class="form-control text-center" placeholder="6 أرقام" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">تحقق</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
