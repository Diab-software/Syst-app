<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>القصة - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="story-viewer"><button class="close" onclick="window.location.href='/dashboard'">✕</button><div>{% if story.media_type == 'image' %}<img src="{{ url_for('download_file', filename='stories/'+story.media_path) }}" class="content">{% elif story.media_type == 'video' %}<video controls class="content" autoplay><source src="{{ url_for('download_file', filename='stories/'+story.media_path) }}"></video>{% elif story.media_type == 'text' %}<div style="background:#fff;padding:30px;border-radius:16px;max-width:400px;text-align:center;font-size:24px;line-height:1.8;">{{ story.content_text or story.caption }}</div>{% endif %}</div><div class="caption">{{ story.caption }}</div><div style="color:#aaa;margin-top:8px;font-size:14px;">من {{ story.user.display_name }}</div></div></body></html>
