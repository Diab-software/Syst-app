<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>محادثة خاصة - Syst</title><link rel="stylesheet" href="/static/style.css"><script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script></head>
<body>
<nav class="navbar"><div class="logo">💬 Syst <span>خاص</span></div><div style="display:flex;gap:8px;align-items:center;"><span style="font-weight:500;">{{ other.display_name }}</span><button onclick="window.location.href='/dashboard'" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 14px;border-radius:30px;cursor:pointer;">⬅️</button></div></nav>
<div class="container">
    <div class="messages" id="messages">
        {% for msg in messages %}
        <div class="msg {% if msg.user_id == user.id %}my-msg{% else %}other-msg{% endif %}" id="msg-{{ msg.id }}">
            <div class="msg-header"><span class="user">{{ msg.user.display_name }}</span><span class="time">{{ msg.timestamp.strftime('%H:%M') }}</span></div>
            <p>{{ msg.content }}</p>
            {% if msg.file_path %}<div class="file-link"><a href="{{ url_for('download_file', filename=msg.file_path.split('/')[-1]) }}" target="_blank">📎 تحميل</a></div>{% endif %}
            <div class="actions"><button onclick="deleteMsg({{ msg.id }})">🗑️</button><button onclick="pinMsg({{ msg.id }})">📌</button></div>
        </div>
        {% endfor %}
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
        <div class="btn-group">
            <button onclick="sendMsg()">إرسال</button>
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="icon-btn" onclick="startRecording()">🎤</button>
            <button class="icon-btn call-btn" onclick="startCall(false)">📞</button>
            <button class="icon-btn call-btn video" onclick="startCall(true)">📹</button>
        </div>
        <input type="file" id="fileInput" style="display:none;" onchange="uploadFile(this, null, {{ other.id }})">
    </div>
</div>

<!-- نافذة المكالمة -->
<div class="call-window" id="callWindow">
    <h3 id="callTitle">مكالمة</h3>
    <video id="localVideo" autoplay muted style="width:100%;border-radius:12px;background:#1A1A2E;"></video>
    <video id="remoteVideo" autoplay style="width:100%;border-radius:12px;background:#1A1A2E;"></video>
    <div class="call-controls">
        <button class="end" onclick="endCall()">إنهاء</button>
        <button class="mute" onclick="toggleMute()">كتم</button>
        <button class="video-toggle" onclick="toggleVideo()">فيديو</button>
    </div>
</div>

<script>
const socket = io();
const user = {{ user.id }};
const other = {{ other.id }};
const room = `private_${Math.min(user, other)}_${Math.max(user, other)}`;
socket.emit('join_private', { user_id: other });

let peerConnection = null;
let localStream = null;
let callActive = false;
let callType = 'voice';

const iceServers = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
    ]
};

socket.on('signal', async (data) => {
    if (data.from !== other.toString()) return;
    if (!peerConnection) {
        if (data.signal.type === 'offer') {
            await createPeerConnection(false);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('signal', { target: data.from, signal: answer });
            callActive = true;
        }
        return;
    }
    try {
        if (data.signal.type === 'offer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('signal', { target: data.from, signal: answer });
        } else if (data.signal.type === 'answer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
        } else if (data.signal.type === 'candidate') {
            await peerConnection.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
        } else if (data.signal.type === 'end') {
            endCall();
        }
    } catch (e) {
        console.error('Signal error:', e);
    }
});

async function createPeerConnection(isInitiator) {
    peerConnection = new RTCPeerConnection(iceServers);
    peerConnection.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('signal', { target: other.toString(), signal: { type: 'candidate', candidate: e.candidate } });
        }
    };
    peerConnection.ontrack = (e) => {
        document.getElementById('remoteVideo').srcObject = e.streams[0];
    };
    if (isInitiator) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: callType === 'video' });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('signal', { target: other.toString(), signal: offer });
            callActive = true;
        } catch (e) {
            alert('فشل بدء المكالمة: ' + e);
        }
    }
}

function startCall(video) {
    if (callActive) return;
    callType = video ? 'video' : 'voice';
    document.getElementById('callWindow').classList.add('active');
    document.getElementById('callTitle').innerText = video ? '📹 مكالمة فيديو' : '📞 مكالمة صوتية';
    createPeerConnection(true);
}

function endCall() {
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    callActive = false;
    document.getElementById('callWindow').classList.remove('active');
    socket.emit('signal', { target: other.toString(), signal: { type: 'end' } });
}

function toggleMute() {
    if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) audioTrack.enabled = !audioTrack.enabled;
    }
}
function toggleVideo() {
    if (localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) videoTrack.enabled = !videoTrack.enabled;
    }
}

// التسجيل الصوتي
let mediaRecorder = null;
let audioChunks = [];
function startRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([blob], `recording_${Date.now()}.webm`, { type: 'audio/webm' });
                uploadFileDirect(file, null, other);
                stream.getTracks().forEach(t => t.stop());
                mediaRecorder = null;
            };
            mediaRecorder.start();
            alert('🎙️ جارٍ التسجيل... اضغط مرة أخرى للإيقاف.');
        })
        .catch(err => alert('لا يمكن الوصول للميكروفون: '+err));
}

function uploadFile(input, group_id, private_with) {
    const file = input.files[0];
    if (!file) return;
    uploadFileDirect(file, group_id, private_with);
    input.value = '';
}
function uploadFileDirect(file, group_id, private_with) {
    const form = new FormData();
    form.append('file', file);
    if (group_id) form.append('group_id', group_id);
    if (private_with) form.append('private_with', private_with);
    fetch('/upload_file', { method: 'POST', body: form })
        .then(r => r.json())
        .then(d => {
            if (!d.success) alert('فشل رفع الملف: '+d.error);
        })
        .catch(() => alert('خطأ في الخادم'));
}

// الرسائل
socket.on('new_message', function(data) {
    if (data.private_with != other && data.user_id != other) return;
    const div = document.createElement('div');
    div.className = `msg ${data.user_id == user ? 'my-msg' : 'other-msg'}`;
    div.innerHTML = `<div class="msg-header"><span class="user">${data.display_name}</span><span class="time">${data.timestamp}</span></div><p>${data.content}</p>`;
    if (data.file_url) div.innerHTML += `<div class="file-link"><a href="${data.file_url}" target="_blank">📎 تحميل</a></div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
});

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send_message', { message: text, private_with: other });
    input.value = '';
}
function deleteMsg(id) { fetch(`/delete_message/${id}`, {method:'POST'}).then(()=>location.reload()); }
function pinMsg(id) { fetch(`/pin_message/${id}`, {method:'POST'}).then(()=>location.reload()); }
</script>
</body></html>
