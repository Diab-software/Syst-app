<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>محادثة مجموعة - Syst</title><link rel="stylesheet" href="/static/style.css"><script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script></head>
<body><nav class="navbar"><div class="logo">💬 Syst <span>مجموعة</span></div><div style="display:flex;gap:8px;align-items:center;"><span style="font-weight:500;">{{ group.name }}</span>
    {% if is_admin %}<button onclick="window.location.href='/group_settings/{{ group.id }}'" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 14px;border-radius:30px;cursor:pointer;">⚙️</button>{% endif %}
    <button onclick="window.location.href='/dashboard'" style="background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 14px;border-radius:30px;cursor:pointer;">⬅️</button>
</div></nav>
<div class="container">
    <div class="messages" id="messages">
        {% for msg in messages %}
        <div class="msg {% if msg.user_id == user.id %}my-msg{% else %}other-msg{% endif %}" id="msg-{{ msg.id }}">
            <div class="msg-header"><span class="user">{{ msg.user.display_name }}</span><span class="time">{{ msg.timestamp.strftime('%H:%M') }}</span></div>
            <p>{{ msg.content }}</p>
            {% if msg.file_path %}<div class="file-link"><a href="{{ url_for('download_file', filename=msg.file_path.split('/')[-1]) }}" target="_blank">📎 تحميل</a></div>{% endif %}
            <div class="actions"><button onclick="deleteMsg({{ msg.id }})">🗑️</button><button onclick="pinMsg({{ msg.id }})">📌</button></div>
        </div>
        {% endfor %}
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
        <div class="btn-group">
            <button onclick="sendMsg()">إرسال</button>
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="icon-btn" onclick="startRecording()">🎤</button>
        </div>
        <input type="file" id="fileInput" style="display:none;" onchange="uploadFile(this, {{ group.id }}, null)">
    </div>
</div>
<script>
const socket = io();
const group = {{ group.id }};
socket.emit('join_group', { group_id: group });

let mediaRecorder = null;
let audioChunks = [];
function startRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([blob], `recording_${Date.now()}.webm`, { type: 'audio/webm' });
                uploadFileDirect(file, group, null);
                stream.getTracks().forEach(t => t.stop());
                mediaRecorder = null;
            };
            mediaRecorder.start();
            alert('🎙️ جارٍ التسجيل... اضغط مرة أخرى للإيقاف.');
        })
        .catch(err => alert('لا يمكن الوصول للميكروفون: '+err));
}

function uploadFile(input, group_id, private_with) {
    const file = input.files[0];
    if (!file) return;
    uploadFileDirect(file, group_id, private_with);
    input.value = '';
}
function uploadFileDirect(file, group_id, private_with) {
    const form = new FormData();
    form.append('file', file);
    if (group_id) form.append('group_id', group_id);
    if (private_with) form.append('private_with', private_with);
    fetch('/upload_file', { method: 'POST', body: form })
        .then(r => r.json())
        .then(d => {
            if (!d.success) alert('فشل رفع الملف: '+d.error);
        })
        .catch(() => alert('خطأ في الخادم'));
}

socket.on('new_message', function(data) {
    if (data.group_id != group) return;
    const div = document.createElement('div');
    div.className = `msg ${data.user_id == {{ user.id }} ? 'my-msg' : 'other-msg'}`;
    div.innerHTML = `<div class="msg-header"><span class="user">${data.display_name}</span><span class="time">${data.timestamp}</span></div><p>${data.content}</p>`;
    if (data.file_url) div.innerHTML += `<div class="file-link"><a href="${data.file_url}" target="_blank">📎 تحميل</a></div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
});

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send_message', { message: text, group_id: group });
    input.value = '';
}
function deleteMsg(id) { fetch(`/delete_message/${id}`, {method:'POST'}).then(()=>location.reload()); }
function pinMsg(id) { fetch(`/pin_message/${id}`, {method:'POST'}).then(()=>location.reload()); }
</script>
</body></html>
