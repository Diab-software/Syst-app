<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل 2FA - Syst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 p-md-5 shadow-lg border-0 rounded-4" style="max-width: 500px; width: 100%;">
            <h4 class="text-center">تفعيل المصادقة الثنائية</h4>
            <p class="text-muted text-center">امسح رمز QR باستخدام تطبيق مثل Google Authenticator</p>
            <div class="text-center my-3">
                <img src="data:image/png;base64,{{ qr_base64 }}" class="img-fluid" style="max-width: 200px;">
            </div>
            <p class="text-center"><strong>السر:</strong> <code>{{ secret }}</code></p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">أدخل رمز 6 أرقام</label>
                    <input type="text" name="otp" class="form-control text-center" placeholder="123456" required>
                </div>
                <button type="submit" class="btn btn-success w-100 rounded-pill py-2">تحقق وأكمل</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
