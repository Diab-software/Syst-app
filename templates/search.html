<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث - Syst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-4" style="max-width:700px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="bi bi-search"></i> البحث عن مستخدمين</h4>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-right"></i> رجوع</a>
        </div>
        <div class="list-group">
            {% for u in users %}
                <a href="{{ url_for('private_chat', user_id=u.id) }}" class="list-group-item list-group-item-action d-flex align-items-center">
                    <div class="chat-item-avatar me-3" style="width:40px; height:40px; font-size:16px;">{{ u.display_name[0] }}</div>
                    <div><strong>{{ u.display_name }}</strong><small class="d-block text-muted">@{{ u.username }}</small></div>
                    <div class="ms-auto">
                        <span class="status-dot {{ 'online' if u.is_online else 'offline' }}"></span>
                        <small class="text-muted me-1">{{ 'متصل' if u.is_online else 'غير متصل' }}</small>
                        <form action="{{ url_for('block_user', user_id=u.id) }}" method="POST" style="display:inline;"><button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('حظر {{ u.display_name }}؟')">حظر</button></form>
                    </div>
                </a>
            {% else %}
                <div class="text-muted text-center py-3">لا توجد نتائج</div>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
