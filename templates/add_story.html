<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة قصة - Syst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-4" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="bi bi-camera"></i> إضافة قصة جديدة</h4>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-right"></i> رجوع</a>
        </div>

        <div class="card p-4 shadow-sm">
            <form action="{{ url_for('upload_story') }}" method="POST" enctype="multipart/form-data">
                <!-- نوع القصة -->
                <div class="mb-3">
                    <label class="form-label">نوع القصة</label>
                    <select name="story_type" id="story_type" class="form-select" onchange="toggleStoryType()">
                        <option value="media">وسائط (صورة / فيديو)</option>
                        <option value="text">نص فقط</option>
                    </select>
                </div>

                <!-- حقل النص (يظهر عند اختيار نص) -->
                <div id="text_area" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">نص القصة</label>
                        <textarea name="content_text" class="form-control" rows="4" placeholder="اكتب قصتك هنا..."></textarea>
                    </div>
                </div>

                <!-- حقل رفع الملف (يظهر عند اختيار وسائط) -->
                <div id="media_area">
                    <div class="mb-3">
                        <label class="form-label">اختر ملف (صورة أو فيديو)</label>
                        <input type="file" name="story_media" class="form-control" accept="image/*,video/*">
                        <small class="text-muted">الصيغ المدعومة: png, jpg, gif, mp4, webm ...</small>
                    </div>
                </div>

                <!-- التسمية التوضيحية -->
                <div class="mb-3">
                    <label class="form-label">تسمية توضيحية (اختياري)</label>
                    <input type="text" name="caption" class="form-control" placeholder="أضف تعليقاً...">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-cloud-upload"></i> نشر القصة
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleStoryType() {
            const type = document.getElementById('story_type').value;
            document.getElementById('text_area').style.display = (type === 'text') ? 'block' : 'none';
            document.getElementById('media_area').style.display = (type === 'media') ? 'block' : 'none';
        }
        // تشغيل عند التحميل
        toggleStoryType();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
