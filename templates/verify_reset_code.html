<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تحقق الكود - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="auth-container"><h1>📧 أدخل الكود</h1><p class="sub">أدخل الكود المكون من 6 أرقام</p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><input type="text" name="code" placeholder="6 أرقام" required pattern="[0-9]{6}"><button type="submit">تحقق</button></form><div class="links"><a href="/forgot-password">← إعادة طلب الكود</a></div></div></body></html>
