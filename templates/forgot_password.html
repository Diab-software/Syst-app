<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>استعادة كلمة المرور - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="auth-container"><h1>🔑 استعادة كلمة المرور</h1><p class="sub">أدخل اسم المستخدم وسنرسل كود التحقق</p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><input type="text" name="username" placeholder="اسم المستخدم" required><button type="submit">إرسال الكود</button></form><div class="links"><a href="/login">← العودة لتسجيل الدخول</a></div></div></body></html>
