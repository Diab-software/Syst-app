<!DOCTYPE html>
<html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إنشاء حساب - Syst</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="auth-container"><h1>💬 Syst</h1><p class="sub">أنشئ حسابك الجديد</p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><input type="text" name="username" placeholder="اسم المستخدم (ثابت)" required><div style="font-size:12px;color:#EF4444;text-align:right;margin-top:-6px;margin-bottom:10px;">⚠️ لا يمكن تغيير اسم المستخدم بعد الإنشاء</div><input type="text" name="display_name" placeholder="الاسم المعروض" required><input type="email" name="email" placeholder="البريد الإلكتروني" required><input type="password" name="password" placeholder="كلمة المرور (6 أحرف)" required minlength="6"><input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور" required><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><input type="checkbox" name="enable_2fa" style="width:20px;height:20px;margin:0;"><span>🔐 تفعيل المصادقة الثنائية (2FA)</span></div><button type="submit">إنشاء حساب</button></form><div class="links"><a href="/login">لديك حساب؟ سجل الدخول</a></div></div></body></html>
