<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Syst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 p-md-5 shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <i class="bi bi-chat-dots-fill text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-2 fw-bold">Syst</h3>
                <p class="text-muted">مرحباً بعودتك</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endwith %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">دخول</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">نسيت كلمة المرور؟</a>
            </div>
            <hr>
            <p class="text-center mb-0">ليس لديك حساب؟ <a href="{{ url_for('signup') }}" class="text-decoration-none fw-bold">سجل الآن</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
